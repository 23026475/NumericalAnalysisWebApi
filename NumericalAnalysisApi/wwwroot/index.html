<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Numerical Analysis API</title>
    <style>
        :root {
            --bg: #fdfdfd;
            --text-main: #1a1a1a;
            --text-muted: #666;
            --border: #e5e5e5;
            --accent: #000;
            --success: #09721b;
            --error: #cc0000;
            --card-bg: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            line-height: 1.5;
            padding: 40px 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        /* --- Header Section --- */
        header {
            margin-bottom: 60px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 20px;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-top: 4px;
        }

        .api-status {
            margin-top: 15px;
            font-size: 0.8rem;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }

        .online-dot {
            background: var(--success);
        }

        .offline-dot {
            background: var(--error);
        }

        /* --- Grid & Cards --- */
        .api-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(450px, 1fr));
            gap: 40px;
        }

        .method-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 24px;
            border-radius: 8px;
            transition: border-color 0.2s ease;
        }

            .method-card:hover {
                border-color: var(--accent);
            }

        .method-header {
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .method-title {
            font-weight: 600;
            font-size: 1.1rem;
        }

        .method-tag {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 2px 8px;
            background: #f0f0f0;
            border-radius: 4px;
            font-weight: 700;
        }

        /* --- Form Elements --- */
        .input-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        input {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid var(--border);
            border-radius: 4px;
            font-size: 0.9rem;
            font-family: inherit;
            transition: all 0.2s;
        }

            input:focus {
                outline: none;
                border-color: var(--accent);
                box-shadow: 0 0 0 2px rgba(0,0,0,0.05);
            }

        button {
            width: 100%;
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 4px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            margin-top: 8px;
        }

            button:hover {
                background: #333;
            }

        /* --- Results Area --- */
        .result-area {
            margin-top: 20px;
            padding: 12px;
            background: #fafafa;
            border: 1px solid var(--border);
            border-radius: 4px;
            font-family: ui-monospace, monospace;
            font-size: 0.85rem;
            min-height: 60px;
            white-space: pre-wrap;
        }

        .success-result {
            color: var(--success);
        }

        .error-result {
            color: var(--error);
        }

        .preview-section {
            grid-column: 1 / -1;
            border-top: 2px solid var(--accent);
        }

        footer {
            margin-top: 80px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
            font-size: 0.8rem;
            color: var(--text-muted);
            text-align: center;
        }

        @media (max-width: 600px) {
            .api-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 Numerical Analysis API</h1>
            <p class="subtitle">Methods for solving non-linear equations $f(x) = 0$</p>
            <div class="api-status">
                <span><span class="status-dot online-dot" id="dot"></span> <span id="apiStatus">System Online</span></span>
                <span style="opacity: 0.5">|</span>
                <span>Base: <code id="baseUrl"></code></span>
            </div>
        </header>

        <div class="api-grid">
            <!-- Bisection Method Card -->
            <div class="method-card">
                <div class="method-header">
                    <span class="method-title">Bisection Method</span>
                    <span class="method-tag">Bracketing</span>
                </div>
                <div class="input-group">
                    <label>Function $f(x)$</label>
                    <input type="text" id="bisectionFunc" value="x^2 - 4">
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div class="input-group">
                        <label>Lower (a)</label>
                        <input type="number" id="bisectionA" value="0" step="any">
                    </div>
                    <div class="input-group">
                        <label>Upper (b)</label>
                        <input type="number" id="bisectionB" value="3" step="any">
                    </div>
                </div>
                <button onclick="testBisection()">Execute POST</button>
                <div class="result-area" id="bisectionResult"></div>
            </div>

            <!-- Newton-Raphson Method Card -->
            <div class="method-card">
                <div class="method-header">
                    <span class="method-title">Newton-Raphson</span>
                    <span class="method-tag">Open Method</span>
                </div>
                <div class="input-group">
                    <label>Function $f(x)$</label>
                    <input type="text" id="newtonFunc" value="x^2 - 4">
                </div>
                <div class="input-group">
                    <label>Derivative $f'(x)$</label>
                    <input type="text" id="newtonDerivative" value="2*x">
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div class="input-group">
                        <label>Initial Guess</label>
                        <input type="number" id="newtonGuess" value="1" step="any">
                    </div>
                    <div class="input-group">
                        <label>Tolerance</label>
                        <input type="number" id="newtonTol" value="0.0001" step="any">
                    </div>
                </div>
                <button onclick="testNewton()">Execute POST</button>
                <div class="result-area" id="newtonResult"></div>
            </div>

            <!-- Secant Method Card -->
            <div class="method-card">
                <div class="method-header">
                    <span class="method-title">Secant Method</span>
                    <span class="method-tag">Open Method</span>
                </div>
                <div class="input-group">
                    <label>Function $f(x)$</label>
                    <input type="text" id="secantFunc" value="x^2 - 4">
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div class="input-group">
                        <label>First Guess (x₀)</label>
                        <input type="number" id="secantX0" value="0" step="any">
                    </div>
                    <div class="input-group">
                        <label>Second Guess (x₁)</label>
                        <input type="number" id="secantX1" value="3" step="any">
                    </div>
                </div>
                <button onclick="testSecant()">Execute POST</button>
                <div class="result-area" id="secantResult"></div>
            </div>

            <!-- Regula Falsi Method Card -->
            <div class="method-card">
                <div class="method-header">
                    <span class="method-title">Regula Falsi</span>
                    <span class="method-tag">Bracketing</span>
                </div>
                <div class="input-group">
                    <label>Function $f(x)$</label>
                    <input type="text" id="regulaFunc" value="x^2 - 4">
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div class="input-group">
                        <label>Lower (a)</label>
                        <input type="number" id="regulaA" value="0" step="any">
                    </div>
                    <div class="input-group">
                        <label>Upper (b)</label>
                        <input type="number" id="regulaB" value="3" step="any">
                    </div>
                </div>
                <button onclick="testRegula()">Execute POST</button>
                <div class="result-area" id="regulaResult"></div>
            </div>

            <!-- Function Preview Section -->
            <div class="method-card preview-section">
                <div class="method-header">
                    <span class="method-title">Function Preview</span>
                    <span class="method-tag">Utility</span>
                </div>
                <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 20px;">
                    <div>
                        <div class="input-group">
                            <label>Expression</label>
                            <input type="text" id="previewFunc" value="sin(x)">
                        </div>
                        <div class="input-group">
                            <label>Test Points (comma separated)</label>
                            <input type="text" id="previewPoints" value="0, 1.57, 3.14">
                        </div>
                    </div>
                    <button onclick="previewFunction()" style="height: fit-content; align-self: end; margin-bottom: 16px;">Evaluate</button>
                </div>
                <div class="result-area" id="previewResult"></div>
            </div>
        </div>

        <footer>
            <p>ASP.NET Core 8.0 • NCalc Engine • Applied Mathematics Research 2026</p>
        </footer>
    </div>

    <script>
        // Set base URL dynamically
        const baseUrl = window.location.origin;
        document.getElementById('baseUrl').textContent = baseUrl + '/api/RootFinding/';

        // Utility function to display results with new styling
        function displayResult(elementId, data) {
            const resultDiv = document.getElementById(elementId);
            if (data.success) {
                resultDiv.innerHTML = `<span class="success-result">✓ Root: ${data.root.toFixed(8)}<br>Iterations: ${data.iterations}</span>`;
            } else {
                resultDiv.innerHTML = `<span class="error-result">✗ Error: ${data.errorType}<br>${data.errorMessage}</span>`;
            }
        }

        // API Functions
        async function testBisection() {
            const request = {
                function: document.getElementById('bisectionFunc').value,
                a: parseFloat(document.getElementById('bisectionA').value),
                b: parseFloat(document.getElementById('bisectionB').value),
                tolerance: 0.0001,
                maxIterations: 100
            };

            try {
                const response = await fetch('/api/RootFinding/bisection', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(request)
                });
                const data = await response.json();
                displayResult('bisectionResult', data);
            } catch (error) {
                document.getElementById('bisectionResult').innerHTML =
                    `<span class="error-result">✗ Network Error: ${error.message}</span>`;
            }
        }

        async function testNewton() {
            const request = {
                function: document.getElementById('newtonFunc').value,
                derivative: document.getElementById('newtonDerivative').value,
                initialGuess: parseFloat(document.getElementById('newtonGuess').value),
                tolerance: parseFloat(document.getElementById('newtonTol').value),
                maxIterations: 100
            };

            try {
                const response = await fetch('/api/RootFinding/newton', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(request)
                });
                const data = await response.json();
                displayResult('newtonResult', data);
            } catch (error) {
                document.getElementById('newtonResult').innerHTML =
                    `<span class="error-result">✗ Network Error: ${error.message}</span>`;
            }
        }

        async function testSecant() {
            const request = {
                function: document.getElementById('secantFunc').value,
                x0: parseFloat(document.getElementById('secantX0').value),
                x1: parseFloat(document.getElementById('secantX1').value),
                tolerance: 0.0001,
                maxIterations: 100
            };

            try {
                const response = await fetch('/api/RootFinding/secant', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(request)
                });
                const data = await response.json();
                displayResult('secantResult', data);
            } catch (error) {
                document.getElementById('secantResult').innerHTML =
                    `<span class="error-result">✗ Network Error: ${error.message}</span>`;
            }
        }

        async function testRegula() {
            const request = {
                function: document.getElementById('regulaFunc').value,
                a: parseFloat(document.getElementById('regulaA').value),
                b: parseFloat(document.getElementById('regulaB').value),
                tolerance: 0.0001,
                maxIterations: 100
            };

            try {
                const response = await fetch('/api/RootFinding/regulafalsi', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(request)
                });
                const data = await response.json();
                displayResult('regulaResult', data);
            } catch (error) {
                document.getElementById('regulaResult').innerHTML =
                    `<span class="error-result">✗ Network Error: ${error.message}</span>`;
            }
        }

        async function previewFunction() {
            const points = document.getElementById('previewPoints').value
                .split(',')
                .map(p => parseFloat(p.trim()))
                .filter(p => !isNaN(p));

            // Auto-capitalize function names for NCalc
            let funcExpr = document.getElementById('previewFunc').value;
            funcExpr = funcExpr.replace(/\b(sin|cos|tan|asin|acos|atan|sinh|cosh|tanh|sqrt|abs|log|ln|exp)\b/g,
                match => match.charAt(0).toUpperCase() + match.slice(1).toLowerCase());

            const request = {
                expression: funcExpr,
                points: points.length > 0 ? points : null
            };

            try {
                const response = await fetch('/api/RootFinding/preview', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(request)
                });
                const data = await response.json();

                if (data.success) {
                    let html = '<span class="success-result">✓ Function values:<br>';
                    data.results.forEach(r => {
                        html += `f(${r.x.toFixed(4)}) = ${r.y.toFixed(6)}<br>`;
                    });
                    html += '</span>';
                    document.getElementById('previewResult').innerHTML = html;
                } else {
                    document.getElementById('previewResult').innerHTML =
                        `<span class="error-result">✗ Error: ${data.errorType}: ${data.errorMessage}</span>`;
                }
            } catch (error) {
                document.getElementById('previewResult').innerHTML =
                    `<span class="error-result">✗ Network Error: ${error.message}</span>`;
            }
        }

        // Test API connection on load
        async function testConnection() {
            try {
                const response = await fetch('/api/RootFinding/preview', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        expression: 'x',
                        points: [1]
                    })
                });
                if (response.ok) {
                    document.getElementById('apiStatus').textContent = 'System Online';
                    document.getElementById('dot').className = 'status-dot online-dot';
                } else {
                    throw new Error('API not responding');
                }
            } catch (error) {
                document.getElementById('apiStatus').textContent = 'System Offline';
                document.getElementById('dot').className = 'status-dot offline-dot';
            }
        }

        // Initialize
        testConnection();
    </script>
</body>
</html>
